spring.config.import=optional:file:../.env[.properties]
spring.config.on-not-found=ignore

###############################################################################
# BASIS-KONFIGURATION
###############################################################################
server.port=8082
# Logging fĂĽr den Nachweis von US-S1 (ParallelitĂ¤t)
logging.level.de.htwsaar.minicdn=DEBUG
cdn.edge-launcher.enabled=true
cdn.edge-launcher.jar-path=../edge/target/edge-1.0-SNAPSHOT-exec.jar

server.error.include-message=always
server.error.include-stacktrace=always

# Region -> Edge Base URL
cdn.edges.eu-west=http://localhost:8081
# cdn.edges.us-east=http://localhost:8083

# Admin Authentication
minicdn.admin.token=${MINICDN_ADMIN_TOKEN}

# Datenbankverbindung (SQLite)
app.jdbc.url=jdbc:sqlite:data/users.db

###############################################################################
# NFA-S1: PERFORMANCE & PARALLELITĂ„T (REQUIRMENT: MIN. 5 GLEICHZEITIGE ANFRAGEN)
###############################################################################

# --- TOMCAT WEB-SERVER THREAD POOL ---
# Diese Threads bearbeiten die eingehenden HTTP-Anfragen (Requests).
# Wir setzen das Maximum auf 20, um die geforderten 5 parallelen Anfragen
# locker zu bedienen und Puffer fĂĽr Admin-Tasks zu haben.
server.tomcat.threads.max=20

# HĂ¤lt 5 Threads im Leerlauf bereit, damit bei einer plĂ¶tzlichen Lastspitze
# keine VerzĂ¶gerung durch das Erzeugen neuer Threads entsteht (niedrige Latenz).
server.tomcat.threads.min-spare=5

# --- ASYNC TASK EXECUTION POOL ---
# Dieser Pool wird genutzt, wenn wir Methoden mit @Async markieren.
# Wichtig im Router, z.B. wenn wir mehrere Edges gleichzeitig pingen oder
# Metriken im Hintergrund aggregieren, ohne den Request zu blockieren.

# Core-GrĂ¶Ăźe: 5 Threads sind permanent fĂĽr Hintergrundaufgaben reserviert.
spring.task.execution.pool.core-size=5

# Max-GrĂ¶Ăźe: Erlaubt kurzes Ansteigen auf 10 Threads bei hoher Rechenlast.
spring.task.execution.pool.max-size=10

# Name fĂĽr das Logging (hilft beim Debugging im Logback)
spring.task.execution.thread-name-prefix=RouterAsync-

###############################################################################
# NFA-S3: ZUSTELLGARANTIE (RESILIENZ BEI CONSUMER-RESTART & FALLBACK)
###############################################################################

# Die Basis-URL des Origins fĂĽr den Fallback-Mechanismus.
# Wenn keine Edge antwortet, garantiert dies die Zustellung direkt vom Quell-Server.
cdn.origin.base-url=http://localhost:8080

# Timeout fĂĽr das "Acknowledgement" (ACK) der Edge in Millisekunden.
# Wir warten 500ms auf eine Antwort, bevor wir es erneut probieren.
cdn.delivery.ack-timeout-ms=500

# Maximale Anzahl an Versuchen (Duplikaten), bevor der Origin-Fallback greift.
# Erfüllt das Kriterium: "Senden von Duplikaten bei ausbleibendem ACK".
cdn.delivery.max-retries=3

# Kurze Pause zwischen den Versuchen (100ms).
# Verhindert, dass wir den Client zu lange warten lassen, gibt einer
# neustartenden Edge aber eine kleine Chance fĂĽr den Retry.
cdn.delivery.retry-interval-ms=100

###############################################################################
# TS-C2: FAILOVER / HEALTH-CHECK
###############################################################################

# Alle wie viele Millisekunden der Router die registrierten Edge-Knoten prĂĽft.
# 5000ms sind sinnvoll, damit ein Ausfall sicher innerhalb von 10 Sekunden
# erkannt werden kann.
cdn.health-check.interval-ms=5000

# Timeout für einen einzelnen Health-Check auf einer Edge.
# Wenn in dieser Zeit keine Antwort kommt, wird die Edge als ausgefallen behandelt.
cdn.health-check.timeout-ms=1000
