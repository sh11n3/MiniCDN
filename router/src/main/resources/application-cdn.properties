spring.config.import=optional:file:../.env[.properties]
spring.config.on-not-found=ignore

server.port=8082
cdn.edge-launcher.enabled=true
cdn.edge-launcher.jar-path=../edge/target/edge-1.0-SNAPSHOT-exec.jar

server.error.include-message=always
server.error.include-stacktrace=always

# Region -> Edge Base URL
cdn.edges.eu-west=http://localhost:8081
# cdn.edges.us-east=http://localhost:8083

# Admin Authentication
minicdn.admin.token=${MINICDN_ADMIN_TOKEN}